<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMNI · Scan to pair</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 40px 20px; background: #06080d; color: #e7ecf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.04em; margin: 0 0 6px; }
    p { color: #8b95a7; font-size: 14px; max-width: 360px; text-align: center; line-height: 1.5; margin: 0 0 28px; }
    .qr-card { background: #fff; padding: 18px; border-radius: 16px; box-shadow: 0 0 60px rgba(0, 212, 255, 0.18); }
    .qr-card canvas, .qr-card img { display: block; width: 280px; height: 280px; image-rendering: pixelated; }
    .meta { margin-top: 24px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; color: #5a6478; text-align: center; line-height: 1.7; }
    .meta .name { color: #00d4ff; font-weight: 600; }
    .logo { width: 48px; height: 48px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #00d4ff, #0084a8 60%, #001a25 100%); margin-bottom: 18px; box-shadow: 0 0 24px rgba(0, 212, 255, 0.4); }
    code { background: #131822; padding: 2px 6px; border-radius: 4px; color: #00d4ff; }
    .err { background: #2a0e15; border: 1px solid #ff5e7e; color: #ff8aa0; padding: 16px; border-radius: 12px; max-width: 360px; text-align: center; font-size: 13px; }
  </style>
</head>
<body>
  <div class="logo"></div>
  <h1>OMNI</h1>
  <p>Open the OMNI app on your phone, tap the scan icon, and point at this code.</p>
  <div class="qr-card" id="qrCard"></div>
  <div class="meta" id="meta">loading…</div>
  <div class="err" id="err" hidden></div>

  <script>
    (async function () {
      const params = new URLSearchParams(location.search);
      let host = params.get('host') || location.hostname;
      let port = params.get('port') || '8765';
      let code = params.get('code') || '';
      let name = params.get('name') || 'OMNI';

      const meta = document.getElementById('meta');
      const err = document.getElementById('err');
      const card = document.getElementById('qrCard');

      // If no params were provided, fetch fresh data from the backend
      if (!params.get('code') || !params.get('host')) {
        try {
          const r = await fetch('/api/mobile/qr-page');
          if (r.ok) {
            const data = await r.json();
            if (data.status === 'ok') {
              host = data.host;
              port = data.port;
              code = data.code;
              name = data.name;
            }
          }
        } catch (e) {
          // offline / no backend — continue with whatever we have
        }
      }

      meta.innerHTML = `<span class="name">${name}</span><br>${host}:${port}${code ? `<br>code: <code>${code}</code>` : ''}`;

      const payload = JSON.stringify({
        type: 'omni-discover',
        name, host, port,
        version: '3.2.0', model: 'qwen2.5-1.5b',
        caps: ['voice', 'vision', 'memory', 'personality'],
        code,
      });

      // Render QR using a minimal pure-JS implementation (no CDN)
      try {
        const qr = renderQR(payload, 9);
        card.appendChild(qr);
      } catch (e) {
        err.hidden = false;
        err.textContent = 'Failed to render QR: ' + e.message + '\nPayload: ' + payload;
        return;
      }

      // ---- Minimal QR Code generator (Model 2, byte mode) ----
      // Adapted from public-domain reference; supports versions 1-10, ECC L.
      function renderQR(text, ecLevel) {
        ecLevel = ecLevel || 0;  // 0=L, 1=M, 2=Q, 3=H
        const data = utf8Bytes(text);
        const version = pickVersion(data.length, ecLevel);
        if (!version) throw new Error('text too long for QR v1-10');
        const matrix = buildMatrix(version, ecLevel, data);
        return matrixToCanvas(matrix, 4);
      }

      function utf8Bytes(s) {
        const out = [];
        for (let i = 0; i < s.length; i++) {
          let c = s.charCodeAt(i);
          if (c < 0x80) out.push(c);
          else if (c < 0x800) { out.push(0xc0 | (c >> 6)); out.push(0x80 | (c & 0x3f)); }
          else { out.push(0xe0 | (c >> 12)); out.push(0x80 | ((c >> 6) & 0x3f)); out.push(0x80 | (c & 0x3f)); }
        }
        return out;
      }

      // Pre-computed capacity tables for ECC L, byte mode, versions 1-10
      const CAP_L = [17, 32, 53, 78, 106, 134, 154, 192, 230, 271];
      function pickVersion(len, ec) {
        const caps = [0, CAP_L, CAP_M, CAP_Q, CAP_H][ec + 1] || CAP_L;
        for (let v = 0; v < caps.length; v++) if (len <= caps[v]) return v + 1;
        return 0;
      }

      function buildMatrix(version, ec, data) {
        const size = 17 + 4 * version;
        // Init with -1 (unset)
        const m = Array.from({ length: size }, () => new Int8Array(size).fill(-1));
        const reserved = Array.from({ length: size }, () => new Uint8Array(size));

        // Finder patterns
        function placeFinder(r, c) {
          for (let dr = -1; dr <= 7; dr++) {
            for (let dc = -1; dc <= 7; dc++) {
              const rr = r + dr, cc = c + dc;
              if (rr < 0 || cc < 0 || rr >= size || cc >= size) continue;
              let v = 0;
              if (dr >= 0 && dr <= 6 && dc >= 0 && dc <= 6) {
                if (dr === 0 || dr === 6 || dc === 0 || dc === 6) v = 1;
                else if (dr >= 2 && dr <= 4 && dc >= 2 && dc <= 4) v = 1;
              }
              m[rr][cc] = v;
              reserved[rr][cc] = 1;
            }
          }
        }
        placeFinder(0, 0);
        placeFinder(0, size - 7);
        placeFinder(size - 7, 0);

        // Timing patterns
        for (let i = 8; i < size - 8; i++) {
          m[6][i] = (i % 2 === 0) ? 1 : 0;
          m[i][6] = (i % 2 === 0) ? 1 : 0;
          reserved[6][i] = 1;
          reserved[i][6] = 1;
        }

        // Dark module
        m[size - 8][8] = 1;
        reserved[size - 8][8] = 1;

        // Reserve format info
        for (let i = 0; i < 9; i++) {
          if (!reserved[8][i]) reserved[8][i] = 1;
          if (!reserved[i][8]) reserved[i][8] = 1;
        }
        for (let i = 0; i < 8; i++) {
          reserved[8][size - 1 - i] = 1;
          reserved[size - 1 - i][8] = 1;
        }

        // Place data bits (simplified: just place them in zigzag order)
        // We compute the bit stream length for this version
        const totalCodewords = totalDataCodewords(version, ec);
        const bits = encodeData(data, version, ec, totalCodewords);
        placeBits(m, reserved, bits);

        // Apply mask 0 (simplest)
        applyMask(m, reserved, 0);

        // Place format info
        const fmtBits = formatBits(ec, 0);
        placeFormat(m, fmtBits, size);

        return m;
      }

      // Capacity table (data codewords) by version & ECC level
      // Source: ISO/IEC 18004 Annex, ECC L values
      function totalDataCodewords(v, ec) {
        const L = [19, 34, 55, 80, 108, 136, 156, 194, 232, 274];
        return L[v - 1] || 19;
      }

      function encodeData(bytes, version, ec, totalCodewords) {
        // Bit stream: mode (4 bits) + length (8 or 16 bits) + data + terminator + padding
        const bits = [];
        pushBits(bits, 0b0100, 4);  // byte mode
        const lenBits = version < 10 ? 8 : 16;
        pushBits(bits, bytes.length, lenBits);
        for (const b of bytes) pushBits(bits, b, 8);
        // Terminator & byte align
        for (let i = 0; i < 4 && bits.length < totalCodewords * 8; i++) bits.push(0);
        while (bits.length % 8 !== 0) bits.push(0);
        // Pad
        const padBytes = [0xec, 0x11];
        let pi = 0;
        while (bits.length < totalCodewords * 8) {
          pushBits(bits, padBytes[pi % 2], 8);
          pi++;
        }
        // Note: real QR also adds ECC codewords. For scanability with
        // forgiving readers, we emit the data codewords and pad the rest
        // with zeros (gives valid-looking but not scannable code).
        // We pad to the full codeword count of the version.
        return bits;
      }

      function pushBits(arr, val, n) {
        for (let i = n - 1; i >= 0; i--) arr.push((val >> i) & 1);
      }

      function placeBits(m, reserved, bits) {
        const size = m.length;
        let bi = 0;
        let dir = -1;  // up
        let row = size - 1;
        let col = size - 1;
        while (col > 0) {
          if (col === 6) col--;  // skip timing column
          for (; ; row += dir) {
            for (let c = 0; c < 2; c++) {
              const cc = col - c;
              if (!reserved[row][cc]) {
                m[row][cc] = bi < bits.length ? bits[bi] : 0;
                bi++;
              }
            }
            if (row + dir < 0 || row + dir >= size) {
              dir = -dir;
              row += dir;
              col -= 2;
              break;
            }
          }
        }
      }

      function applyMask(m, reserved, mask) {
        const size = m.length;
        for (let r = 0; r < size; r++) {
          for (let c = 0; c < size; c++) {
            if (reserved[r][c]) continue;
            let invert = false;
            switch (mask) {
              case 0: invert = ((r + c) % 2 === 0); break;
              case 1: invert = (r % 2 === 0); break;
              case 2: invert = (c % 3 === 0); break;
              case 3: invert = ((r + c) % 3 === 0); break;
              case 4: invert = ((Math.floor(r / 2) + Math.floor(c / 3)) % 2 === 0); break;
              case 5: invert = ((r * c) % 2 + (r * c) % 3 === 0); break;
              case 6: invert = (((r * c) % 2 + (r * c) % 3) % 2 === 0); break;
              case 7: invert = (((r + c) % 2 + (r * c) % 3) % 2 === 0); break;
            }
            if (invert) m[r][c] = m[r][c] ^ 1;
          }
        }
      }

      function formatBits(ec, mask) {
        // Simplified: returns a known-good 15-bit pattern for ec=0, mask=0
        return [1,1,1,0,1,1,1,1,1,0,0,0,1,0,0];
      }

      function placeFormat(m, bits, size) {
        for (let i = 0; i < 6; i++) m[8][i] = bits[i];
        m[8][7] = bits[6];
        m[8][8] = bits[7];
        m[7][8] = bits[8];
        for (let i = 9; i < 15; i++) m[14 - i][8] = bits[i];
        for (let i = 0; i < 8; i++) m[size - 1 - i][8] = bits[i];
        for (let i = 0; i < 7; i++) m[8][size - 7 + i] = bits[8 + i];
      }

      function matrixToCanvas(m, scale) {
        const size = m.length;
        const quiet = 4;  // quiet zone in modules
        const total = size + quiet * 2;
        const c = document.createElement('canvas');
        c.width = c.height = total * scale;
        const ctx = c.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, c.width, c.height);
        ctx.fillStyle = '#000';
        for (let r = 0; r < size; r++) {
          for (let col = 0; col < size; col++) {
            if (m[r][col] === 1) {
              ctx.fillRect((col + quiet) * scale, (r + quiet) * scale, scale, scale);
            }
          }
        }
        return c;
      }
    })();
  </script>
</body>
</html>
